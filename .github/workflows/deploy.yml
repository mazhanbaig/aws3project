name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force full deployment (app + terraform)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"
  PACKER_VERSION: "1.10.0"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Detect what changed
  # ──────────────────────────────────────────────────────────────
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      terraform: ${{ steps.filter.outputs.terraform }}
      packer: ${{ steps.filter.outputs.packer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'package.json'
              - 'package-lock.json'
            terraform:
              - 'terraform/**'
              - '!terraform/packer/**'
            packer:
              - 'terraform/packer/**'
              - 'terraform/scripts/**'

      - name: 📋 Summary
        run: |
          echo "## 🔍 Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Code | ${{ steps.filter.outputs.app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ steps.filter.outputs.terraform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Packer | ${{ steps.filter.outputs.packer }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Force deploy:** ${{ github.event.inputs.force_deploy || 'false' }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # Job 2: Test the application
  # ──────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event.inputs.force_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: 📦 Install dependencies
        working-directory: app
        run: npm ci

      - name: 🔎 Typecheck
        working-directory: app
        run: npm run typecheck 2>&1 | tee /tmp/typecheck.log || true

      - name: 🧪 Run tests
        working-directory: app
        run: npm run test 2>&1 | tee /tmp/test.log || true

      - name: 📋 Test Summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/typecheck.log 2>/dev/null || echo "No typecheck output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/test.log 2>/dev/null || echo "No test output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # Job 3: Bake AMI with Packer
  # ──────────────────────────────────────────────────────────────
  packer:
    name: 📦 Packer Bake AMI
    needs: [changes, test]
    if: |
      always() &&
      (needs.changes.outputs.app == 'true' || needs.changes.outputs.packer == 'true' || github.event.inputs.force_deploy == 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      ami_id: ${{ steps.packer-build.outputs.ami_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: 🔑 Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name competitor-tracker \
            --query "Stacks[0].Outputs[?OutputKey=='api_gateway_url'].OutputValue" \
            --output text 2>/dev/null || echo "")
          
          # Fallback: try terraform output
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            cd terraform
            API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "")
          fi
          
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: 🔨 Packer Init
        working-directory: terraform/packer
        run: packer init app.pkr.hcl

      - name: 🔨 Packer Validate
        working-directory: terraform/packer
        run: |
          packer validate \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "app_branch=${{ github.ref_name }}" \
            -var "api_gateway_url=${{ steps.get-api-url.outputs.api_url }}" \
            -var "build_id=${{ github.run_id }}" \
            app.pkr.hcl

      - name: 🔨 Packer Build
        id: packer-build
        working-directory: terraform/packer
        run: |
          packer build \
            -var "aws_region=${{ env.AWS_REGION }}" \
            -var "app_branch=${{ github.ref_name }}" \
            -var "api_gateway_url=${{ steps.get-api-url.outputs.api_url }}" \
            -var "build_id=${{ github.run_id }}" \
            -color=false \
            app.pkr.hcl 2>&1 | tee /tmp/packer.log
          
          AMI_ID=$(grep -o '"ami_id":"[^"]*"' build-manifest.json | head -1 | cut -d'"' -f4)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          
          echo "### 📦 Packer Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AMI ID:** \`$AMI_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build ID:** \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/packer.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # Job 4: Terraform Plan & Apply
  # ──────────────────────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform
    needs: [changes, test, packer]
    if: |
      always() &&
      (needs.changes.outputs.terraform == 'true' || needs.packer.outputs.ami_id != '' || github.event.inputs.force_deploy == 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.packer.result == 'success' || needs.packer.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app_url: ${{ steps.output-url.outputs.app_url }}
      api_url: ${{ steps.output-url.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Create terraform.tfvars
        working-directory: terraform
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # Determine AMI ID: use Packer output if available, else empty (fallback)
          AMI_ID="${{ needs.packer.outputs.ami_id || '' }}"
          
          cat > terraform.tfvars <<EOF
          aws_region="${{ env.AWS_REGION }}"
          db_password="$DB_PASSWORD"
          jwt_secret="$JWT_SECRET"
          instance_type="t3.micro"
          db_instance_type="db.t3.micro"
          app_repo_url="${{ github.server_url }}/${{ github.repository }}.git"
          app_ami_id="$AMI_ID"
          app_branch="${{ github.ref_name }}"
          asg_min_size=1
          asg_max_size=2
          asg_desired_capacity=1
          EOF

      - name: 🏗️ Terraform Init
        id: init
        working-directory: terraform
        run: |
          terraform init -input=false 2>&1 | tee /tmp/tf-init.log
          echo "### 🏗️ Terraform Init" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 /tmp/tf-init.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Terraform Validate
        id: validate
        working-directory: terraform
        run: terraform validate -no-color

      - name: 📋 Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan -input=false -detailed-exitcode -no-color -out=tfplan 2>&1 | tee /tmp/tf-plan.log || true
          echo "### 📋 Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/tf-plan.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Terraform Apply
        id: apply
        working-directory: terraform
        run: |
          echo "### 🚀 Terraform Apply" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform apply -input=false -auto-approve tfplan 2>&1 | tee /tmp/tf-apply.log
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📤 Output URLs
        id: output-url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url 2>/dev/null || echo "N/A")
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "N/A")
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

          echo "### 🌐 Deployed URLs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| App (ALB) | $APP_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | $API_URL |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────
  # Job 5: Trigger ASG Instance Refresh
  # ──────────────────────────────────────────────────────────────
  instance-refresh:
    name: 🔄 ASG Instance Refresh
    needs: [terraform]
    if: needs.terraform.result == 'success' && needs.terraform.outputs.app_url != 'N/A'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔄 Start ASG Instance Refresh
        id: refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name competitor-tracker-asg \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
            --query "InstanceRefreshId" \
            --output text)

          echo "refresh_id=$REFRESH_ID" >> $GITHUB_OUTPUT
          echo "### 🔄 ASG Instance Refresh Started" >> $GITHUB_STEP_SUMMARY
          echo "**Refresh ID:** \`$REFRESH_ID\`" >> $GITHUB_STEP_SUMMARY

      - name: ⏳ Wait for Refresh to Complete
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          echo "⏳ Waiting for instance refresh $REFRESH_ID to complete..."
          
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name competitor-tracker-asg \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)
            
            echo "  Status: $STATUS"
            
            if [ "$STATUS" = "Successful" ]; then
              echo "✅ Instance refresh completed successfully!"
              echo "### ✅ ASG Instance Refresh Complete" >> $GITHUB_STEP_SUMMARY
              echo "**Status:** Successful" >> $GITHUB_STEP_SUMMARY
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Instance refresh failed with status: $STATUS"
              exit 1
            fi
            
            sleep 30
          done

  # ──────────────────────────────────────────────────────────────
  # Job 6: Final Summary
  # ──────────────────────────────────────────────────────────────
  summary:
    name: 📊 Summary
    needs: [changes, test, packer, terraform, instance-refresh]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Pipeline Summary
        run: |
          echo "# 🚀 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Detect Changes | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test | ${{ needs.test.result == 'success' && '✅' || needs.test.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Packer Bake AMI | ${{ needs.packer.result == 'success' && '✅' || needs.packer.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Terraform | ${{ needs.terraform.result == 'success' && '✅' || needs.terraform.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 ASG Refresh | ${{ needs.instance-refresh.result == 'success' && '✅' || needs.instance-refresh.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ needs.packer.outputs.ami_id }}" ]; then
            echo "**AMI Deployed:** \`${{ needs.packer.outputs.ami_id }}\`" >> $GITHUB_STEP_SUMMARY
          fi
